server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # 客户端最大上传大小（与后端 MAX_FILE_SIZE 一致，50MB）
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 二维码图片目录
    location /qrcodes/ {
        alias /usr/share/nginx/html/qrcodes/;
        expires 7d;
    }

    # 后端健康检查（公网排障时直接访问 /health）
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 代理到后端（关键：支持SSE流式输出）
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应支持（AI问答流式输出必需）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;  # 大文件上传不缓存到磁盘，直接流式转发
        proxy_read_timeout 300s;  # AI问答/大文件上传可能耗时较长
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # 后端文档下载等直连（如果有）
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }
    location /redoc {
        proxy_pass http://backend:8000/redoc;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # SPA 路由支持（React Router）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
