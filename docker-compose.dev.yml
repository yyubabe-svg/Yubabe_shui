# 开发环境配置（保留原配置）
version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./vector_db:/app/vector_db
    environment:
      - DATABASE_URL=sqlite:///./shushui_ai.db
      - MOCK_MODE=true
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
