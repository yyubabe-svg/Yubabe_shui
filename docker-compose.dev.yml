# 开发环境配置（保留原配置）
version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/vector_db:/app/vector_db
      - ./backend/db_data:/app/db_data
      - ./backend/keys:/app/keys
      - ./backend/resources/iso_templates:/app/resources/iso_templates
    environment:
      - DATABASE_URL=sqlite:////app/db_data/shushui_ai.db
      - UPLOAD_DIR=/app/uploads
      - VECTOR_DB_PATH=/app/vector_db
      - MOCK_MODE=true
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
